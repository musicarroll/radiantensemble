{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Radiant Ensemble{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'community/css/site.css' %}">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{% url 'home' %}">
      <span class="brand-mark">RE</span>
      <span>radiantensemble.com</span>
    </a>
    <nav class="top-nav" aria-label="Primary navigation">
      <a href="{% url 'home' %}">Home</a>
      <a href="{% url 'about' %}">About</a>
      <a href="{% url 'upcoming_events' %}">Events</a>
      <a href="{% url 'contact' %}">Contact</a>
      {% if request.user.is_authenticated %}
        <a href="{% url 'calendar' %}">Calendar</a>
        <a href="{% url 'bug_report_list' %}">Bugs</a>
        <a href="{% url 'feature_request_list' %}">Features</a>
        <a href="/admin/">Admin</a>
        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button type="submit">Log out</button>
        </form>
      {% else %}
        <a href="{% url 'login' %}">Login</a>
      {% endif %}
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
